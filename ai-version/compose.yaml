services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      # ERROR: Using 'localhost' instead of the service name 'db' inside the container network.
      DATABASE_URL: postgres://postgres:dev@localhost:5432/tasks
    depends_on:
      - db

  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: tasks
    # ERROR: Mounting directly to /var/lib/postgresql/data which fails with version/permission conflicts on Docker Desktop
    volumes:
      - taskdata:/var/lib/postgresql/data

volumes:
  taskdata:
